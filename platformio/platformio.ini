
[env]
platform = espressif32
framework = espidf
board = waveshare_esp32_touch_lcd_43b

monitor_speed = 115200
monitor_filters =
	time
	esp32_exception_decoder

debug_tool = esp-builtin

board_build.partitions = partitions.csv

lib_deps =
	https://github.com/esp-arduino-libs/ESP32_Display_Panel.git @ 1.0.5
    https://github.com/esp-arduino-libs/ESP32_IO_Expander.git @ 1.1.1
    https://github.com/esp-arduino-libs/esp-lib-utils.git @ 0.3.0
	lvgl/lvgl @ 8.4.0
	https://github.com/eez-open/eez-framework.git
	bblanchon/ArduinoJson @ 7.4.2

extra_scripts =
	pre:copy_ui.py

build_flags =
	-D EEZ_FOR_LVGL
	-D EEZ_PLATFORM_ESP32
	-D ESP_PANEL_DRIVERS_BUS_ENABLE_RGB
	-D CONFIG_IDF_TARGET_ESP32S3
	-D CONFIG_LVGL_PORT_AVOID_TEARING_MODE=3
	-D BOARD_HAS_PSRAM
	-D ESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED
	-D BOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_4_3_B
	-D LV_LVGL_H_INCLUDE_SIMPLE

[env:release]
build_type = release
build_flags =
	${env.build_flags}
	-D NDEBUG

[env:debug]
build_type = debug
build_flags =
	${env.build_flags}
